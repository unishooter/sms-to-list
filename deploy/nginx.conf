# /etc/nginx/conf.d/sms-list-app.conf
#
# ALB terminates HTTPS and forwards plain HTTP to this server on port 80.
# This config serves the React app as static files and proxies /api/* to Express.

server {
    listen 80;
    server_name _;

    root /var/www/sms-list-app;
    index index.html;

    # Trust the ALB's X-Forwarded-For header
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # React SPA — serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to Express
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Cache static assets aggressively (Vite adds content hashes to filenames)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
